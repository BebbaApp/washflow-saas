appId: com.aumsoft.washflow
productName: Washflow
copyright: Copyright © 2025 Aumsoft Technology

directories:
  output: dist-electron
  buildResources: public

files:
  - dist/**/*
  - electron/**/*
  - public/favicon.ico
  - node_modules/**/*
  - package.json

extraMetadata:
  main: electron/main.cjs

win:
  icon: public/favicon.ico
  target:
    - target: nsis
      arch:
        - x64
        - ia32
  publisherName: Aumsoft Technology (Pty) Ltd
  artifactName: Washflow-Setup-${version}.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: public/favicon.ico
  uninstallerIcon: public/favicon.ico
  installerHeaderIcon: public/favicon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Washflow
  displayLanguageSelector: false
  license: LICENSE.txt

mac:
  icon: public/favicon.ico
  category: public.app-category.business
  target:
    - dmg

linux:
  icon: public/favicon.ico
  category: Office
  target:
    - AppImage
    - deb

publish:
  provider: github
  owner: BebbaApp
  repo: washflow-saas
