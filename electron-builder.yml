appId: com.aumsoft.washflow
productName: Washflow
copyright: Copyright © 2025 Aumsoft Technology

directories:
  output: dist-electron
  buildResources: public

files:
  - dist/**/*
  - electron/**/*
  - public/favicon.ico
  - package.json

asarUnpack:
  - "**/*.{node,dll}"
  - "**/icudtl.dat"
  - "**/snapshot_blob.bin"
  - "**/v8_context_snapshot.bin"

extraMetadata:
  main: electron/main.cjs

win:
  icon: public/favicon.ico
  target:
    - target: nsis
      arch:
        - x64
  publisherName: Aumsoft Technology (Pty) Ltd
  artifactName: Washflow-Setup-${version}.exe
  electronLanguages:
    - en-US

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: public/favicon.ico
  uninstallerIcon: public/favicon.ico
  installerHeaderIcon: public/favicon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Washflow
  displayLanguageSelector: false
  license: LICENSE.txt

mac:
  icon: public/favicon.ico
  category: public.app-category.business
  target:
    - dmg

linux:
  icon: public/favicon.ico
  category: Office
  target:
    - AppImage

publish:
  provider: github
  owner: BebbaApp
  repo: washflow-saas
